<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>8 Puzzle | Solae Games</title>
  <meta name="description" content="8パズル（8 Puzzle）。START（広告）でプレイできます。" />

  <style>
    :root{--bg:#0b0f1a;--panel:#111a2e;--tile:#26365f;--text:#fff;--muted:#aab3d6;--gap:10px;--blue:#3b82f6;--line:rgba(255,255,255,.10)}
    body{margin:0;font-family:system-ui,-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center}
    .app{width:min(720px,100%);padding:16px}
    .top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin:6px 0 10px}
    h1{font-size:20px;margin:0}
    .sub{color:var(--muted);font-size:12px;margin-top:6px;line-height:1.5}
    .lang{display:flex;gap:6px;align-items:center;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:999px;padding:6px}
    .chip{border:0;border-radius:999px;padding:6px 10px;font-weight:900;cursor:pointer;background:transparent;color:var(--muted)}
    .chip.on{background:rgba(255,255,255,.10);color:#fff}

    .panel{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 16px 40px rgba(0,0,0,.28)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}

    .pill{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);padding:8px 10px;border-radius:999px;font-size:14px}
    .pill b{font-weight:1000}

    .btn{border:none;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:1000;cursor:pointer;width:100%}
    .primary{background:linear-gradient(180deg,#60a5fa,var(--blue));color:#081126}
    .secondary{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12)}

    .board{width:min(380px,92vw);aspect-ratio:1/1;margin:14px auto;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:var(--gap);display:grid;grid-template-columns:repeat(3,1fr);gap:var(--gap)}
    .tile{border-radius:16px;background:var(--tile);border:1px solid rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:1000;user-select:none;cursor:pointer}
    .empty{background:transparent;border:1px dashed rgba(255,255,255,.18);cursor:default}

    .msg{min-height:26px;text-align:center;color:var(--muted);margin-top:10px;line-height:1.6}
    .msg strong{color:#6ee7b7}
    .hint{color:var(--muted);font-size:12px;margin-top:8px;line-height:1.5;text-align:center}
    .btnRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btnRow button{flex:1}
  </style>
</head>

<body>
  <div class="app">
    <div class="top">
      <div>
        <h1 id="hTitle">8パズル</h1>
        <div class="sub" id="hSub">空白のとなりをタップして動かします</div>
      </div>
      <div class="lang" aria-label="language">
        <button class="chip" id="jaBtn">JA</button>
        <button class="chip" id="enBtn">EN</button>
      </div>
    </div>

    <div class="panel">
      <div class="row">
        <div class="pill"><span id="movesLabel">手数</span> <b id="moves">0</b></div>
        <div class="pill"><span id="timeLabel">時間</span> <b id="time">00:00</b></div>
      </div>

      <div class="btnRow">
        <button class="btn primary" id="startAdBtn">▶ START（広告）</button>
        <button class="btn secondary" id="gateBtn">ゲート</button>
      </div>

      <div id="board" class="board" aria-label="Puzzle board"></div>
      <div id="msg" class="msg"></div>

      <div class="hint" id="hint">
        「START（広告）」は必ず <b>ゲート → 広告 → このゲーム</b> の順で戻ります。
      </div>
    </div>
  </div>

<script>
(() => {
  // =========================
  // 設定
  // =========================
  const GATE_URL = "https://satoshikishimoto.github.io/solae-game-gate/";

  // =========================
  // i18n
  // =========================
  const i18n = {
    ja: {
      title:"8パズル",
      sub:"空白のとなりをタップして動かします",
      start:"▶ START（広告）",
      startAgain:"▶ START（広告でもう一回）",
      gate:"ゲート",
      moves:"手数",
      time:"時間",
      hint:"「START（広告）」は必ず <b>ゲート → 広告 → このゲーム</b> の順で戻ります。",
      ready:"STARTを押してね。",
      cleared:(m,t)=>`できた！ <strong>手数:${m} / 時間:${t}</strong><br>もう一回は「START（広告）」で！`
    },
    en: {
      title:"8 Puzzle",
      sub:"Tap a tile next to the empty space to move it.",
      start:"▶ START (AD)",
      startAgain:"▶ START (AD) again",
      gate:"Gate",
      moves:"Moves",
      time:"Time",
      hint:"\"START (AD)\" always goes <b>Gate → Ad → This game</b>.",
      ready:"Press START.",
      cleared:(m,t)=>`Cleared! <strong>Moves:${m} / Time:${t}</strong><br>Play again via START (AD)!`
    }
  };

  const params = new URLSearchParams(location.search);

  function getLang(){
    const q = (params.get('lang')||'').toLowerCase();
    const saved = (localStorage.getItem('solae_lang')||'').toLowerCase();
    return (q==='en'||q==='ja') ? q : (saved==='en'||saved==='ja') ? saved : 'ja';
  }
  function setLang(lang){
    localStorage.setItem('solae_lang', lang);
    applyLang(lang);
    const u = new URL(location.href);
    u.searchParams.set('lang', lang);
    history.replaceState(null, "", u.toString());
  }
  function applyLang(lang){
    document.documentElement.lang = lang;
    document.getElementById('jaBtn').classList.toggle('on', lang==='ja');
    document.getElementById('enBtn').classList.toggle('on', lang==='en');
    document.getElementById('hTitle').textContent = i18n[lang].title;
    document.getElementById('hSub').textContent = i18n[lang].sub;
    document.getElementById('startAdBtn').textContent = i18n[lang].start;
    document.getElementById('gateBtn').textContent = i18n[lang].gate;
    document.getElementById('movesLabel').textContent = i18n[lang].moves;
    document.getElementById('timeLabel').textContent = i18n[lang].time;
    document.getElementById('hint').innerHTML = i18n[lang].hint;
  }

  document.getElementById('jaBtn').onclick = ()=>setLang('ja');
  document.getElementById('enBtn').onclick = ()=>setLang('en');

  // =========================
  // 8-puzzle core
  // =========================
  const GOAL=[1,2,3,4,5,6,7,8,0], N=3;
  let state=GOAL.slice(), moves=0, started=false, solved=true;
  let t0=0, timer=null;

  const board=document.getElementById('board');
  const movesEl=document.getElementById('moves');
  const timeEl=document.getElementById('time');
  const msg=document.getElementById('msg');
  const startBtn=document.getElementById('startAdBtn');

  const idxToRC=i=>[Math.floor(i/N), i%N];
  const rcToIdx=(r,c)=>r*N+c;

  const fmt=ms=>{
    const s=Math.floor(ms/1000);
    const mm=String(Math.floor(s/60)).padStart(2,'0');
    const ss=String(s%60).padStart(2,'0');
    return `${mm}:${ss}`;
  };

  const startTimer=()=>{
    if(timer) return;
    t0=performance.now();
    timer=setInterval(()=>timeEl.textContent=fmt(performance.now()-t0),250);
  };
  const stopTimer=()=>{ if(timer){ clearInterval(timer); timer=null; } };
  const resetTimer=()=>{ stopTimer(); timeEl.textContent="00:00"; };

  const isSolved=arr=>arr.every((v,i)=>v===GOAL[i]);

  // 完成形から合法手で混ぜる＝必ず解ける
  const shuffleSolvable=(steps=160)=>{
    state=GOAL.slice();
    let empty=state.indexOf(0), prev=-1;
    for(let k=0;k<steps;k++){
      const [r,c]=idxToRC(empty);
      const cand=[];
      if(r>0) cand.push(rcToIdx(r-1,c));
      if(r<N-1) cand.push(rcToIdx(r+1,c));
      if(c>0) cand.push(rcToIdx(r,c-1));
      if(c<N-1) cand.push(rcToIdx(r,c+1));
      const filtered=cand.filter(x=>x!==prev);
      const pickFrom=filtered.length?filtered:cand;
      const pick=pickFrom[Math.floor(Math.random()*pickFrom.length)];
      [state[pick], state[empty]]=[state[empty], state[pick]];
      prev=empty; empty=pick;
    }
    if(isSolved(state)) shuffleSolvable(40);
  };

  const render=()=>{
    board.innerHTML="";
    state.forEach((v,i)=>{
      const d=document.createElement('div');
      d.className='tile'+(v===0?' empty':'');
      d.textContent=v===0?'':String(v);
      d.onclick=()=>move(i);
      board.appendChild(d);
    });
    movesEl.textContent=String(moves);
  };

  const canMove=i=>{
    const e=state.indexOf(0);
    const [r1,c1]=idxToRC(i);
    const [r2,c2]=idxToRC(e);
    return Math.abs(r1-r2)+Math.abs(c1-c2)===1;
  };

  const move=i=>{
    if(solved) return;
    if(state[i]===0) return;
    if(!canMove(i)) return;

    if(!started){ started=true; startTimer(); msg.textContent=""; }
    const e=state.indexOf(0);
    [state[i],state[e]]=[state[e],state[i]];
    moves++;
    render();

    if(isSolved(state)){
      solved=true; stopTimer();
      const lang = getLang();
      msg.innerHTML = i18n[lang].cleared(moves, timeEl.textContent);
      startBtn.textContent = i18n[lang].startAgain;
    }
  };

  function startGame(){
    shuffleSolvable(160);
    moves=0; started=false; solved=false;
    resetTimer();
    const lang = getLang();
    msg.textContent = i18n[lang].ready;
    startBtn.textContent = i18n[lang].startAgain; // 一度でも遊んだら “again” にしてOK
    render();
  }

  // =========================
  // START(AD) → Gate → return
  // =========================
  function goGate(){
    const lang = getLang();

    // このゲーム自身のURL（クリーン版：クエリを消す）
    const self = new URL(location.origin + location.pathname);
    self.searchParams.set('lang', lang);

    const gate = new URL(GATE_URL);
    gate.searchParams.set('to', self.toString());
    gate.searchParams.set('lang', lang);
    gate.searchParams.set('v', Date.now().toString()); // 毎回広告を出しやすく

    location.href = gate.toString();
  }

  document.getElementById('gateBtn').onclick = () => {
    const lang = getLang();
    location.href = GATE_URL + "?lang=" + lang + "&v=" + Date.now();
  };
  startBtn.onclick = goGate;

  // 初期化
  applyLang(getLang());
  render();

  // ✅ ゲートから戻ったら自動スタート
  if ((params.get('from')||'') === 'gate'){
    startGame();
  } else {
    msg.textContent = i18n[getLang()].ready;
  }
})();
</script>
</body>
</html>
